<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Juniii</title>
    <!-- Beautiful Handwriting Font Link -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Aapki website ka wahi exact same background original folder se */
            background: url('background.jpg') no-repeat center center/cover;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* Agar folder mein image ka naam background.png hai to aap upar badal sakti hain */

        /* Container for the whole page */
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 412px; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10px;
        }

        /* Big Header Text behind the envelope */
        .bg-text-container {
            text-align: center;
            margin-top: 30px;
            z-index: 1; 
        }

        .bg-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: #ff477e;
            text-shadow: 0 0 15px rgba(255, 71, 126, 0.9), 0 0 25px rgba(255, 71, 126, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.2;
        }

        .bg-subtitle {
            font-size: 1.9rem;
            font-weight: 700;
            color: #ff477e;
            text-shadow: 0 0 15px rgba(255, 71, 126, 0.9);
            margin-top: 5px;
            letter-spacing: 1px;
        }

        /* Envelope Container */
        .envelope-wrapper {
            position: relative;
            width: 320px;
            height: 220px;
            background-color: #d81b60; 
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: pointer;
            margin-top: auto;
            margin-bottom: auto;
            z-index: 5; 
        }

        /* Front Flaps using clip-path for sharp clean look */
        .envelope-wrapper::before {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background-color: #e91e63; 
            clip-path: polygon(0% 0%, 50% 50%, 100% 0%, 100% 100%, 0% 100%);
            z-index: 3;
        }

        .envelope-wrapper::after {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background-color: #ff4081; 
            clip-path: polygon(0% 100%, 50% 45%, 100% 100%);
            z-index: 4;
        }

        /* Top Lid of Envelope */
        .envelope-lid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #c2185b; 
            clip-path: polygon(0% 0%, 50% 50%, 100% 0%);
            transform-origin: top;
            transition: transform 0.6s ease, z-index 0.3s ease;
            z-index: 5;
        }

        /* When envelope is opened */
        .envelope-wrapper.open .envelope-lid {
            transform: rotateX(180deg);
            z-index: 2; 
        }

        /* Inside Letter Card */
        .letter-card {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            height: 200px;
            border-radius: 8px;
            padding: 25px 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.6s ease, height 0.6s ease;
            z-index: 2; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Confetti style inside the card */
            background-image: radial-gradient(#ff4081 10%, transparent 11%),
                              radial-gradient(#00e676 10%, transparent 11%),
                              radial-gradient(#29b6f6 10%, transparent 11%),
                              radial-gradient(#ffca28 10%, transparent 11%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px, 10px 5px, 5px 20px;
            background-color: #fffdf9;
        }

        /* Beautiful Handwriting style for wording */
        .card-text {
            font-family: 'Caveat', cursive;
            font-size: 1.65rem;
            color: #4a1525;
            text-align: center;
            line-height: 1.4;
            font-weight: 700;
        }

        /* When open: card slides up and grows bigger */
        .envelope-wrapper.open .letter-card {
            transform: translateY(-130px);
            height: 350px;
            z-index: 6; /* Sab se upar taake text overlap na ho */
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        /* Bottom Action Button */
        .btn-container {
            width: 100%;
            padding: 0 10px;
            margin-bottom: 10px;
            z-index: 10;
        }

        .action-btn {
            display: block;
            width: 100%;
            background: linear-gradient(45deg, #ff4081, #ff79b0);
            color: white;
            text-align: center;
            padding: 15px;
            border-radius: 25px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(255, 64, 129, 0.4);
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .action-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        
        <!-- Big Header Text behind the card -->
        <div class="bg-text-container">
            <div class="bg-title">HAPPY<br>BIRTHDAY MERA</div>
            <div class="bg-subtitle">BACHA</div>
        </div>

        <!-- Interactive Envelope -->
        <div class="envelope-wrapper" id="envelope" onclick="toggleEnvelope()">
            <div class="envelope-lid"></div>
            
            <!-- Inside Surprise Card -->
            <div class="letter-card">
                <div class="card-text">
                    HAPPY BIRTHDAY MERI JAN 😊🌻👑🌈<br>
                    Aj ap ka 17th birthday h,<br>
                    aj ap ka din h. Ham sath<br>
                    m to cake cut nhi kar sakte,<br>
                    lakin ese hi sahi chalen, ab<br>
                    jaldi se cake cut karen meri<br>
                    jan 😊🥳
                </div>
            </div>
        </div>

        <!-- Bottom Button -->
        <div class="btn-container">
            <button class="action-btn" onclick="goToCakePage()">Chalen Cake Cut Karen! 🥳</button>
        </div>

    </div>

    <script>
        function toggleEnvelope() {
            const envelope = document.getElementById('envelope');
            envelope.classList.toggle('open');
        }

        function goToCakePage() {
            window.location.href = 'cake.html'; 
        }
    </script>
</body>
</html>
