 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sheikh Sahab!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #0d0116 0%, #1a021f 50%, #000000 100%);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px;
        }

        /* Birthday Heading */
        .birthday-heading {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ff477e;
            text-align: center;
            margin-bottom: 60px;
            text-shadow: 0 0 15px rgba(255, 71, 126, 0.8);
            line-height: 1.4;
            max-width: 90%;
            z-index: 10;
        }

        /* Main Container */
        .envelope-container {
            position: relative;
            width: 330px;
            height: 230px;
            z-index: 5;
            cursor: pointer;
        }

        /* Letter Card Inside - 100% Hidden on Start */
        .card {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 300px;
            height: 200px;
            background: #fffbf2;
            border-radius: 8px;
            padding: 25px 20px;
            z-index: 2; /* Folds ke piche locked */
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .card p {
            font-family: 'Caveat', cursive;
            font-size: 1.6rem; 
            color: #360b17;
            line-height: 1.4;
            font-weight: 700;
        }

        /* Envelope Shapes */
        .envelope-back {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #bd2d59;
            border-radius: 12px;
            z-index: 1;
        }
        .envelope-left {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 165px solid #e64a79;
            border-top: 115px solid transparent;
            border-bottom: 115px solid #e64a79;
            border-radius: 0 0 0 12px;
            z-index: 3;
        }
        .envelope-right {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 0;
            height: 0;
            border-right: 165px solid #e64a79;
            border-top: 115px solid transparent;
            border-bottom: 115px solid #e64a79;
            border-radius: 0 0 12px 0;
            z-index: 3;
        }
        .envelope-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 165px solid transparent;
            border-right: 165px solid transparent;
            border-bottom: 115px solid #d93d6c;
            border-radius: 0 0 12px 12px;
            z-index: 4;
        }
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 165px solid transparent;
            border-right: 165px solid transparent;
            border-top: 125px solid #b5224e;
            transform-origin: top;
            transition: transform 0.6s ease;
            z-index: 5; /* Sabse upar taake band rakhe */
        }

        /* BARA AUR CUTE REAL HEART */
        .heart-sticker {
            position: absolute;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 55px; /* Bara size */
            line-height: 1;
            z-index: 6;
            transition: all 0.4s ease;
            user-select: none;
        }

        /* --- Open Animations --- */
        .envelope-container.open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }
        .envelope-container.open .heart-sticker {
            transform: translateX(-50%) scale(0);
            opacity: 0;
        }
        .envelope-container.open .card {
            transform: translateY(-160px);
            z-index: 7; /* Khulne ke baad message upar aa jayega */
            height: auto;
            min-height: 250px;
        }

        /* Next Button */
        .next-btn {
            display: none;
            margin-top: 60px;
            padding: 15px 40px;
            background: linear-gradient(45deg, #ff477e, #ff7096);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 71, 126, 0.6);
            text-decoration: none;
            z-index: 10;
        }

        .hint {
            margin-top: 35px;
            font-size: 1rem;
            color: #ffb3c6;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 22px;
            border-radius: 20px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="birthday-heading">
        HAPPY BIRTHDAY MERA BACHA ☺️🌻👑🌈
    </div>

    <div class="envelope-container" id="envelopeContainer" onclick="openEnvelope()">
        <div class="envelope-back"></div>
        <div class="card">
            <p>HAPPY BIRTHDAY MERI JAN aj ap ka 17th birthday h aj ap ka din h ham sath m to cake cut nhi kar sakte lakin ese hi sahi chalen ab jaldi she cake cut karen meri jan ☺️🥳</p>
        </div>
        <div class="envelope-left"></div>
        <div class="envelope-right"></div>
        <div class="envelope-bottom"></div>
        <div class="flap"></div>
        <div class="heart-sticker">❤️</div>
    </div>
    
    <div class="hint" id="hintText">Bade Heart par click karke lifafa kholein! ❤️</div>

    <a href="cake.html" class="next-btn" id="nextButton">Chalen Cake Cut Karen! 🎂</a>

    <script>
        function openEnvelope() {
            const container = document.getElementById('envelopeContainer');
            const nextBtn = document.getElementById('nextButton');
            const hint = document.getElementById('hintText');
            
            container.classList.add('open');
            hint.style.display = 'none';
            
            setTimeout(() => {
                nextBtn.style.display = 'block';
            }, 1000);
        }
    </script>
</body>
        </html>
