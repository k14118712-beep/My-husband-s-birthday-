<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Juniii!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 50%, #f0e6ff 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
        }
        /* Modern Birthday Heading */
        .birthday-heading {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ff477e;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.1);
            animation: popIn 1s ease-out;
            line-height: 1.4;
        }
        /* Envelope Container */
        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            perspective: 1000px;
            animation: float 3s ease-in-out infinite;
        }
        .envelope {
            position: relative;
            width: 300px;
            height: 200px;
            background: #ff7096;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 0 0 10px 10px;
            transition: transform 0.5s;
        }
        /* Envelope Flap */
        .envelope::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 110px solid #ff477e;
            transform-origin: top;
            transition: transform 0.5s 0.3s;
            z-index: 3;
        }
        /* Card inside envelope */
        .card {
            position: absolute;
            top: 10px;
            left: 15px;
            width: 270px;
            height: 180px;
            background: #ffffff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            z-index: 2;
            transition: transform 0.5s 0.5s, z-index 0s 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .card p {
            font-size: 1.1rem;
            color: #4a4a4a;
            line-height: 1.5;
            font-weight: 500;
        }
        /* Open State Styling */
        .envelope-wrapper.open .envelope::before {
            transform: rotateX(180deg);
            z-index: 1;
        }
        .envelope-wrapper.open .card {
            transform: translateY(-120px);
            z-index: 4;
            height: auto;
            min-height: 220px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        /* Floating Button for Next Page */
        .next-btn {
            display: none;
            margin-top: 40px;
            padding: 12px 30px;
            background: #ff477e;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 71, 126, 0.4);
            transition: 0.3s;
            text-decoration: none;
        }
        .next-btn:hover {
            background: #ff7096;
            transform: translateY(-3px);
        }
        /* Animations */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        /* Tap Hint */
        .hint {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #888;
            transition: 0.3s;
        }
        .envelope-wrapper.open + .hint {
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="birthday-heading">
        HAPPY BIRTHDAY MERA BACHA ☺️🌻👑🌈
    </div>

    <div class="envelope-wrapper" id="envelopeWrapper" onclick="openEnvelope()">
        <div class="envelope"></div>
        <div class="card">
            <p>HAPPY BIRTHDAY MERI JAN aj ap ka 17th birthday h aj ap ka din h ham sath m to cake cut nhi kar sakte lakin ese hi sahi chalen ab jaldi she cake cut karen meri jan ☺️🥳</p>
        </div>
    </div>
    
    <div class="hint">Lifafa kholne ke liye click karein! ✨</div>

    <a href="cake.html" class="next-btn" id="nextButton">Chalen Cake Cut Karen! 🎂</a>

    <script>
        function openEnvelope() {
            const wrapper = document.getElementById('envelopeWrapper');
            const nextBtn = document.getElementById('nextButton');
            
            wrapper.classList.add('open');
            
            // Card khulne ke baad button thodi der mein dikhega
            setTimeout(() => {
                nextBtn.style.display = 'block';
            }, 1000);
        }
    </script>
</body>
</html>
