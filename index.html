<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Junaid!</title>
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #0d0116 0%, #1a021f 50%, #000000 100%);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px;
            position: relative;
        }

        /* Neon Floating Birthday Elements */
        .bg-decorations {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            font-size: 1.8rem;
            opacity: 0.4;
        }
        .decor { position: absolute; filter: drop-shadow(0 0 10px rgba(255, 71, 126, 0.6)); }
        .d1 { top: 8%; left: 8%; animation: float 4s ease-in-out infinite; }
        .d2 { top: 12%; right: 10%; animation: float 3.5s ease-in-out infinite 0.5s; }
        .d3 { bottom: 15%; left: 12%; animation: float 4.5s ease-in-out infinite 1s; }
        .d4 { bottom: 10%; right: 8%; animation: float 3.8s ease-in-out infinite 0.2s; }

        /* Neon Glowing Birthday Heading */
        .birthday-heading {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ff477e;
            text-align: center;
            margin-bottom: 50px;
            text-shadow: 0 0 15px rgba(255, 71, 126, 0.8);
            animation: popIn 1.2s ease-out;
            line-height: 1.4;
            max-width: 90%;
            z-index: 10;
        }

        /* Envelope Main Container */
        .envelope-container {
            position: relative;
            width: 330px;
            height: 230px;
            z-index: 5;
            animation: float 3s ease-in-out infinite;
            cursor: pointer;
        }

        /* Secret Card Inside - Pehle completely hidden */
        .card {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 300px;
            height: 200px;
            background: #fffbf2;
            border-radius: 8px;
            padding: 25px 20px;
            z-index: 2; /* Folds ke piche rahega start mein */
            transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        
        .card p {
            font-family: 'Caveat', cursive;
            font-size: 1.65rem; 
            color: #360b17;
            line-height: 1.4;
            font-weight: 700;
        }

        /* Envelope Base Background */
        .envelope-back {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #bd2d59;
            border-radius: 12px;
            z-index: 1;
        }

        /* Left & Right Folds */
        .envelope-left {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 165px solid #e64a79;
            border-top: 115px solid transparent;
            border-bottom: 115px solid #e64a79;
            border-radius: 0 0 0 12px;
            z-index: 3;
        }
        .envelope-right {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 0;
            height: 0;
            border-right: 165px solid #e64a79;
            border-top: 115px solid transparent;
            border-bottom: 115px solid #e64a79;
            border-radius: 0 0 12px 0;
            z-index: 3;
        }

        /* Bottom Fold */
        .envelope-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 165px solid transparent;
            border-right: 165px solid transparent;
            border-bottom: 115px solid #d93d6c;
            border-radius: 0 0 12px 12px;
            z-index: 4;
        }
        
        /* Poora Band Envelope Top Flap */
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 165px solid transparent;
            border-right: 165px solid transparent;
            border-top: 125px solid #b5224e;
            transform-origin: top;
            transition: transform 0.6s ease;
            z-index: 5; /* Sabse upar taake card poora band ho */
        }

        /* BHT BADA AUR CUTE HEART STICKER */
        .heart-sticker {
            position: absolute;
            top: 95px;
            left: 50%;
            transform: translateX(-50%) scale(1);
            width: 70px; /* Size bada kar diya */
            height: 70px;
            background: #ff0044;
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
            z-index: 6; /* Flap ke bhi upar lock lagane ke liye */
            transition: transform 0.3s ease, opacity 0.3s;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.4));
        }

        /* --- Open State Animations --- */
        .envelope-container.open .flap {
            transform: rotateX(180deg);
            z-index: 1; /* Khulne ke baad piche chala jayega */
        }
        .envelope-container.open .heart-sticker {
            transform: translateX(-50%) scale(0);
            opacity: 0;
        }
        .envelope-container.open .card {
            transform: translateY(-150px);
            z-index: 7; /* Khulne ke baad card sabse upar aa jayega */
            height: auto;
            min-height: 250px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* Next Button */
        .next-btn {
            display: none;
            margin-top: 60px;
            padding: 15px 40px;
            background: linear-gradient(45deg, #ff477e, #ff7096);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 71, 126, 0.6);
            transition: all 0.3s ease;
            text-decoration: none;
            z-index: 10;
        }
        .next-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 0 25px rgba(255, 71, 126, 0.9);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }
        @keyframes popIn {
            0% { transform: scale(0.85); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .hint {
            margin-top: 35px;
            font-size: 1rem;
            color: #ffb3c6;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            padding: 8px 22px;
            border-radius: 20px;
            z-index: 10;
            border: 1px solid rgba(255, 71, 126, 0.3);
        }
        .envelope-container.open + .hint {
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="bg-decorations">
        <div class="decor d1">🎈</div> <div class="decor d2">✨</div>
        <div class="decor d3">🥳</div> <div class="decor d4">🎈</div>
    </div>

    <div class="birthday-heading">
        HAPPY BIRTHDAY MERA BACHA ☺️🌻👑🌈
    </div>

    <!-- Completely Fixed Folded Envelope Container -->
    <div class="envelope-container" id="envelopeContainer" onclick="openEnvelope()">
        <div class="envelope-back"></div>
        <div class="card">
            <p>HAPPY BIRTHDAY MERI JAN aj ap ka 17th birthday h aj ap ka din h ham sath m to cake cut nhi kar sakte lakin ese hi sahi chalen ab jaldi she cake cut karen meri jan ☺️🥳</p>
        </div>
        <div class="envelope-left"></div>
        <div class="envelope-right"></div>
        <div class="envelope-bottom"></div>
        <div class="flap"></div>
        <div class="heart-sticker"></div>
    </div>
    
    <div class="hint">Bade Heart par click karke lifafa kholein! ❤️</div>

    <a href="cake.html" class="next-btn" id="nextButton">Chalen Cake Cut Karen! 🎂</a>

    <script>
        function openEnvelope() {
            const container = document.getElementById('envelopeContainer');
            const nextBtn = document.getElementById('nextButton');
            
            container.classList.add('open');
            
            setTimeout(() => {
                nextBtn.style.display = 'block';
            }, 1200);
        }
    </script>
</body>
    </html>
