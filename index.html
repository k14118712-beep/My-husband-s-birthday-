<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Juniii!</title>
    <!-- Google Fonts for Beautiful Handwriting and Clean Text -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Poppins:wght@600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            /* Modern Birthday Pastel Gradient with floating soft sparkles effect */
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 50%, #f0e6ff 100%);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px;
            position: relative;
        }

        /* Modern Birthday Sparkle / Confetti Background Elements */
        body::before {
            content: '🎈 ✨ 🥳 🎈 ✨';
            position: absolute;
            top: 10%;
            font-size: 1.5rem;
            opacity: 0.3;
            letter-spacing: 20px;
            width: 100%;
            text-align: center;
        }
        
        /* Modern Birthday Title */
        .birthday-heading {
            font-size: 2.2rem;
            font-weight: 600;
            color: #ff477e;
            text-align: center;
            margin-bottom: 60px;
            text-shadow: 2px 4px 10px rgba(255, 71, 126, 0.2);
            animation: popIn 1.2s ease-out;
            line-height: 1.5;
            max-width: 90%;
            z-index: 10;
        }

        /* Large Heart Envelope Container */
        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            perspective: 1000px;
            animation: float 3s ease-in-out infinite;
            z-index: 5;
        }
        
        /* Big Premium Envelope Box */
        .envelope {
            position: relative;
            width: 340px;
            height: 230px;
            background: #ff7096;
            box-shadow: 0 15px 35px rgba(0,0,0,0.18);
            border-radius: 0 0 12px 12px;
            transition: transform 0.5s;
        }
        
        /* Envelope Flap */
        .envelope::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 170px solid transparent;
            border-right: 170px solid transparent;
            border-top: 130px solid #ff477e;
            transform-origin: top;
            transition: transform 0.5s 0.3s;
            z-index: 5;
            filter: drop-shadow(0 4px 5px rgba(0,0,0,0.1));
        }

        /* The Big Cute Heart Sticker on the Envelope */
        .heart-sticker {
            position: absolute;
            top: 95px;
            left: 50%;
            transform: translateX(-50%) scale(1);
            width: 45px;
            height: 45px;
            background: #ff0a54;
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
            z-index: 6;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.15));
            transform-origin: center;
        }

        .envelope-wrapper:hover .heart-sticker {
            transform: translateX(-50%) scale(1.15);
        }

        /* Beautiful Letter Card inside envelope */
        .card {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 310px;
            height: 200px;
            background: #fffdf9; /* Light elegant paper look */
            border-radius: 8px;
            padding: 25px 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.02), 0 5px 15px rgba(0,0,0,0.05);
            z-index: 2;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s, z-index 0s 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: 1px solid #fff5f7;
        }
        
        /* Beautiful Handwriting Style (Wazeh aur Pyari) */
        .card p {
            font-family: 'Caveat', cursive;
            font-size: 1.6rem; 
            color: #4a1525;
            line-height: 1.4;
            word-spacing: 1px;
            font-weight: 600;
        }

        /* Open State Animations */
        .envelope-wrapper.open .envelope::before {
            transform: rotateX(180deg);
            z-index: 1;
        }
        .envelope-wrapper.open .heart-sticker {
            transform: translateX(-50%) translateY(-100px) scale(0);
            opacity: 0;
        }
        .envelope-wrapper.open .card {
            transform: translateY(-150px);
            z-index: 6;
            height: auto;
            min-height: 260px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        /* Modern Next Page Button */
        .next-btn {
            display: none;
            margin-top: 60px;
            padding: 14px 35px;
            background: linear-gradient(45deg, #ff477e, #ff7096);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 71, 126, 0.4);
            transition: all 0.3s ease;
            text-decoration: none;
            z-index: 10;
        }
        .next-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 25px rgba(255, 71, 126, 0.5);
        }

        /* Soft Floating Effect */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }
        @keyframes popIn {
            0% { transform: scale(0.85); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Soft Hint Text */
        .hint {
            margin-top: 25px;
            font-size: 0.95rem;
            color: #a38ba3;
            font-weight: 500;
            transition: 0.3s;
            background: rgba(255, 255, 255, 0.5);
            padding: 6px 18px;
            border-radius: 15px;
            z-index: 10;
        }
        .envelope-wrapper.open + .hint {
            opacity: 0;
        }
    </style>
</head>
<body>

    <!-- Bada Modern Title -->
    <div class="birthday-heading">
        HAPPY BIRTHDAY MERA BACHA ☺️🌻👑🌈
    </div>

    <!-- Beautiful Large Heart Envelope -->
    <div class="envelope-wrapper" id="envelopeWrapper" onclick="openEnvelope()">
        <div class="envelope"></div>
        <div class="heart-sticker"></div>
        <div class="card">
            <!-- Pyari Handwriting me Message -->
            <p>HAPPY BIRTHDAY MERI JAN aj ap ka 17th birthday h aj ap ka din h ham sath m to cake cut nhi kar sakte lakin ese hi sahi chalen ab jaldi she cake cut karen meri jan ☺️🥳</p>
        </div>
    </div>
    
    <div class="hint">Heart par click karke lifafa kholein! ✨</div>

    <!-- Next Page Button -->
    <a href="cake.html" class="next-btn" id="nextButton">Chalen Cake Cut Karen! 🎂</a>

    <script>
        function openEnvelope() {
            const wrapper = document.getElementById('envelopeWrapper');
            const nextBtn = document.getElementById('nextButton');
            
            wrapper.classList.add('open');
            
            setTimeout(() => {
                nextBtn.style.display = 'block';
            }, 1200);
        }
    </script>
</body>
    </html>
